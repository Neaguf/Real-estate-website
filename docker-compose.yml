services:
  backend:
    build:
      context: ./backend
    container_name: real_estate_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
      - backend_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - meilisearch
    command: sh -lc "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  postgres:
    image: postgres:16-alpine
    container_name: real_estate_postgres
    environment:
      POSTGRES_DB: real_estate
      POSTGRES_USER: real_estate
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: real_estate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: real_estate_meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  nginx:
    image: nginx:1.27-alpine
    container_name: real_estate_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  meili_data:
  backend_vendor:
